<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js"></script>
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="index.html">Appweb</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="index.html">Accueil</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link" href="./view/dashboard.html">Random</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link" href="./view/admin.html">Admin</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link disabled" aria-disabled="true">Disabled</a>
                    </li>
                    <li class="nav-item">
                    <button id="logout-btn" class="btn btn-primary">Se déconnecter</button>
                    </li>
                </ul>
                </div>
            </div>
        </nav>
    </header>

    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary m-5" data-bs-toggle="modal" data-bs-target="#inscription">
        Créer un compte
    </button>

    <!-- Modal -->
    <div class="modal fade" id="inscription" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="inscriptionLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="inscriptionLabel">Formulaire d'inscription</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="my-form">
                        <div class="mb-3">
                            <input type="text" class="form-control mb-3" id="name-input" placeholder="Enter your name" required>
                            <input type="text" class="form-control mb-3" id="email-input" placeholder="Enter your email" required>
                            <small id="password-help" class="form-text mb-3">Le mot de passe doit contenir au moins 4 caractères, une majuscule, une minuscule et un chiffre</small>
                            <input type="password" class="form-control mb-3" id="password-input" placeholder="Enter your password" required>
                            <small id="confirm-password-help" class="form-text mb-3">Veuillez confirmer votre mot de passe</small>
                            <input type="password" class="form-control mb-3" id="confirm-password-input" placeholder="Confirm your password" required>
                            <button id="display-password" class="btn btn-dark" type="button">Afficher le mot de passe</button>

                        </div>
                        <button id="submit-btn" class="btn btn-dark mb-5" type="submit" >S'enregistrer</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary m-5" data-bs-toggle="modal" data-bs-target="#login">
        Se connecter
    </button>

    <!-- Modal -->
    <div class="modal fade" id="login" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="loginLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="loginLabel">Formulaire de connexion</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="my-form">
                        <div class="mb-3">
                            <input type="text" class="form-control mb-3" id="email-input-login" placeholder="Enter your email" required>
                            <input type="password" class="form-control mb-3" id="password-input-login" placeholder="Enter your password" required>
                            <button id="display-password-login" class="btn btn-dark" type="button">Afficher le mot de passe</button>

                        </div>
                        <button id="login-btn" class="btn btn-dark mb-5" type="submit" >Se connecter</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT -->
     <script type="module" src="dist/script/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
